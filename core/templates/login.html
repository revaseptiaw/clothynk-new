<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Clothynk</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0A0A0A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .brand { font-size: 1.4rem; font-weight: 800; color: #0A0A0A; }
    .brand-sub { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
    h2 { font-size: 1.25rem; font-weight: 700; color: #1A1A2E; }
    .form-control {
      border: 1.5px solid #E8ECF0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }
    .form-control:focus { border-color: #6C63FF; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
    label { font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 6px; }
    .btn-login {
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-weight: 700;
      width: 100%;
      font-size: 0.95rem;
      transition: background .2s;
    }
    .btn-login:hover { background: #5A52D5; }
    .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="mb-4">
      <div class="brand">✦ Clothynk</div>
      <div class="brand-sub">Clothing CRM Platform</div>
    </div>
    <h2 class="mb-1">Selamat Datang</h2>
    <p class="text-muted mb-4" style="font-size:0.85rem;">Masuk ke dashboard Superadmin</p>

    {% if form.errors %}
      <div class="alert alert-danger">Username atau password salah. Coba lagi.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="superadmin" autofocus required>
      </div>
      <div class="mb-4">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Masuk →</button>
    </form>
    <p class="text-center text-muted mt-3" style="font-size:0.75rem;">
      Hubungi tim IT jika lupa password
    </p>
  </div>
</body>
</html>
